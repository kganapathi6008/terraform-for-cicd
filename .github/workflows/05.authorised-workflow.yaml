name: 05.authorised-workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        type: choice
        options:
          - dev
          - stage
          - prod
        default: dev

jobs:
  authorize:
    runs-on: ubuntu-latest

    env:
      ALLOWED_USERS: "kganapathi600823145,surya,john"

    steps:
      - name: Check User Authorization
        run: |
          ACTOR="${{ github.actor }}"

          # Convert comma-separated string → array
          IFS=',' read -ra USERS <<< "$ALLOWED_USERS"

          echo "Triggered by: $ACTOR"
          echo "Allowed users: ${USERS[@]}"

          for user in "${USERS[@]}"; do
            if [[ "$user" == "$ACTOR" ]]; then
              echo "User is authorized"
              exit 0
            fi
          done

          echo "User $ACTOR is not authorized to run this pipeline."
          exit 1

  terraform:
    needs: authorize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    env:
      BACKEND_FILE: ${{ github.event.inputs.environment }}-backend.hcl

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=${{ env.BACKEND_FILE }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan