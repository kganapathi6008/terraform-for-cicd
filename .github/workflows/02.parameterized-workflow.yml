name: 02.parameterized-workflow

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    # All variables in one place
    env:
      ENVIRONMENT: dev
      AWS_REGION: us-east-1
      BACKEND_FILE: dev-backend.hcl

      # NOT SAFE (for learning only)
      AWS_ACCESS_KEY_ID: AKIA2HOE25LB33RILPRB
      AWS_SECRET_ACCESS_KEY: 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

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=${{ env.BACKEND_FILE }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan